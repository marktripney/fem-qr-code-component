<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./images/favicon-32x32.png"
        />
        <!-- Google Fonts (Outfit, variable) -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
            rel="stylesheet"
        />
        <!-- /Google Fonts -->
        <link rel="stylesheet" href="./css/main.css" />
        <title>Frontend Mentor | QR code component</title>
    </head>
    <body>
        <div class="wrapper outfit">
            <main class="main">
                <div class="card">
                    <img
                        class="card-img-qr-code"
                        src="./images/image-qr-code.png"
                        alt="QR Code on a blue background"
                    />
                    <div class="card-text-area">
                        <h1 class="card-heading fw-700">
                            Improve your front-end skills by building projects
                        </h1>
                        <p class="card-copy fw-400">
                            Scan the QR code to visit Frontend Mentor and take
                            your coding skills to the next level
                        </p>
                    </div>
                </div>
            </main>

            <footer class="footer-main attribution">
                Challenge by
                <a
                    href="https://www.frontendmentor.io?ref=challenge"
                    target="_blank"
                    >Frontend Mentor</a
                >. Coded by <a href="#">Mark Tripney</a>.
            </footer>
        </div>
    </body>
</html>
